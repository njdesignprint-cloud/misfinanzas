<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section" class="app-container" style="display: none;">
        <header class="main-header">
            <h1>Finanzas Elite</h1>
            <p>Tu patrimonio en alta definición</p>
        </header>
        <div class="input-card">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btn-login" class="btn-principal">Entrar al Sistema</button>
        </div>
    </div>

    <div id="app-section" class="app-container" style="display: none;">
        <header class="main-header">
            <div class="header-top">
                <input type="month" id="filtro-mes">
                <button id="btn-logout">Salir</button>
            </div>
            
            <div class="balance-card">
                <button id="btn-dark-mode" class="toggle-theme">🌙</button>
                <small>DISPONIBLE ACTUAL</small>
                <h1 id="balance-total">$0.00</h1>
                
                <div class="presupuesto-container">
                    <div class="presupuesto-info">
                        <span>Meta de Gasto</span>
                        <span id="txt-presupuesto">$0 / $1000</span>
                    </div>
                    <div class="progress-bar"><div id="bar-progreso" class="progress-fill"></div></div>
                </div>

                <div class="resumen-mini">
                    <div class="res-item"><small>Entradas</small><p id="res-ingresos" class="monto-ingreso">$0</p></div>
                    <div class="res-sep"></div>
                    <div class="res-item"><small>Salidas</small><p id="res-gastos" class="monto-gasto">$0</p></div>
                </div>
            </div>
        </header>

        <div class="chart-card"><canvas id="miGrafico"></canvas></div>

        <div class="input-card">
            <div class="row">
                <input type="number" id="monto" placeholder="0.00">
                <select id="tipo">
                    <option value="gasto">Gasto 🔻</option>
                    <option value="ingreso">Ingreso 🔺</option>
                </select>
            </div>
            <input type="text" id="categoria" placeholder="Categoría (Comida, Renta...)">
            <button id="btn-guardar" class="btn-principal">Registrar</button>
            <button id="btn-set-presupuesto" class="btn-secundario">⚙️ Ajustar Límite Mensual</button>
        </div>

        <div class="search-box">
            <input type="text" id="buscador" placeholder="🔍 Buscar movimiento...">
        </div>
        
        <div id="lista-movimientos"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
