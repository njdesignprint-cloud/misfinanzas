<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas Familiares Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="month-selector">
                <input type="month" id="filtro-mes">
            </div>
            <small>Balance del Mes</small>
            <h1 id="balance-total">$0.00</h1>
        </header>

        <div class="chart-card">
            <canvas id="miGrafico"></canvas>
        </div>

        <main class="input-card">
            <div class="row">
                <input type="number" id="monto" placeholder="0.00" inputmode="decimal">
                <select id="tipo">
                    <option value="gasto">Gasto</option>
                    <option value="ingreso">Ingreso</option>
                </select>
            </div>
            <input type="text" id="categoria" placeholder="Categoría (Comida, Renta, Salario...)">
            
            <div class="actions">
                <label class="btn-secundario">
                    📷 Recibo
                    <input type="file" id="foto" accept="image/*" capture="camera" hidden>
                </label>
                <button id="btn-guardar" class="btn-principal">Guardar</button>
            </div>
        </main>

        <section class="history">
            <h3>Movimientos</h3>
            <div id="lista-movimientos"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
