<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas Familiares</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section" class="app-container" style="display: none;">
        <header class="main-header">
            <h1>Finanzas Familia</h1>
            <p>Inicia sesión o regístrate</p>
        </header>
        <div class="input-card">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btn-login" class="btn-principal">Entrar / Registrar</button>
        </div>
    </div>

    <div id="app-section" class="app-container" style="display: none;">
        <header class="main-header">
            <div class="header-top">
                <input type="month" id="filtro-mes">
                <button id="btn-logout">Salir</button>
            </div>
            <small>Balance del Mes</small>
            <h1 id="balance-total">$0.00</h1>
        </header>

        <div class="chart-card">
            <canvas id="miGrafico"></canvas>
        </div>

        <div class="input-card">
            <div class="row">
                <input type="number" id="monto" placeholder="0.00" inputmode="decimal">
                <select id="tipo">
                    <option value="gasto">Gasto</option>
                    <option value="ingreso">Ingreso</option>
                </select>
            </div>
            <input type="text" id="categoria" placeholder="Categoría (Ej: Comida, Salario)">
            <button id="btn-guardar" class="btn-principal">Guardar Transacción</button>
        </div>

        <div id="lista-movimientos" class="history"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
