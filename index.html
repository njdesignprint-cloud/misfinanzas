<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas Elite Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section" class="app-container" style="display: none;">
        <header class="main-header">
            <h1>Finanzas Pro</h1>
            <p>Control financiero total</p>
        </header>
        <div class="card">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btn-login" class="btn-principal">Entrar</button>
        </div>
    </div>

    <div id="app-section" class="app-container" style="display: none;">
        <div class="top-nav">
            <input type="month" id="filtro-mes">
            <button id="btn-logout">Salir</button>
        </div>

        <div class="card balance-card">
            <button id="btn-dark-mode" class="toggle-theme">🌙</button>
            <small>ESTADO DE CUENTA</small>
            <h1 id="balance-total">$0.00</h1>
            <div class="resumen-row">
                <div class="res-box"><small>Ingresos</small><p id="res-ingresos" class="monto-ingreso">+$0</p></div>
                <div class="res-box"><small>Gastos</small><p id="res-gastos" class="monto-gasto">-$0</p></div>
            </div>
        </div>

        <div class="card fixed-expenses-section">
            <h3>Gastos Fijos Recurrentes</h3>
            <p style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 10px;">Toca para registrar y agendar recordatorio</p>
            <div class="fixed-grid" id="fixed-grid">
                </div>
        </div>

        <div class="card chart-section">
            <canvas id="miGrafico"></canvas>
        </div>

        <div class="card form-section">
            <h3>Nuevo Movimiento Manual</h3>
            <div class="input-group">
                <label>Monto</label>
                <input type="number" id="monto" placeholder="0.00" class="input-lg">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Tipo</label>
                    <select id="tipo" class="input-lg">
                        <option value="gasto">Gasto 🔻</option>
                        <option value="ingreso">Ingreso 🔺</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Categoría</label>
                    <input type="text" id="categoria" placeholder="Ej. Comida" class="input-lg">
                </div>
            </div>
            <button id="btn-guardar" class="btn-principal btn-lg">Guardar Registro</button>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>Movimientos</h3>
                <input type="text" id="buscador" placeholder="🔍 Buscar...">
            </div>
            <div id="lista-movimientos"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
