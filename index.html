<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas Elite Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-section" class="app-container" style="display: none;">
        <div class="card auth-card">
            <h1>Finanzas Pro</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btn-login" class="btn-principal">Entrar</button>
        </div>
    </div>

    <div id="app-section" class="app-container" style="display: none;">
        <div class="top-nav">
            <input type="month" id="filtro-mes">
            <button id="btn-logout">Salir</button>
        </div>

        <div class="card balance-card">
            <button id="btn-dark-mode" class="toggle-theme">🌙</button>
            <small>BALANCE TOTAL</small>
            <h1 id="balance-total">$0.00</h1>
            <div class="resumen-row">
                <div class="res-box"><small>Ingresos</small><p id="res-ingresos" class="monto-ingreso">+$0</p></div>
                <div class="res-box"><small>Gastos</small><p id="res-gastos" class="monto-gasto">-$0</p></div>
            </div>
        </div>

        <div class="card">
            <div class="header-flex">
                <h3>Gastos Fijos</h3>
                <button id="btn-nuevo-fijo" class="btn-add">+</button>
            </div>
            <p style="font-size: 0.65rem; opacity: 0.5; margin-bottom: 10px;">Toque para pagar • Mantenga para eliminar</p>
            <div class="fixed-grid" id="fixed-grid"></div>
        </div>

        <div class="card chart-section">
            <canvas id="miGrafico"></canvas>
        </div>

        <div class="card form-section">
            <h3>Registro Manual</h3>
            <input type="number" id="monto" placeholder="0.00" class="input-lg">
            <div class="row">
                <select id="tipo" class="input-lg">
                    <option value="gasto">Gasto 🔻</option>
                    <option value="ingreso">Ingreso 🔺</option>
                </select>
                <input type="text" id="categoria" placeholder="Categoría" class="input-lg">
            </div>
            <button id="btn-guardar" class="btn-principal">Guardar</button>
        </div>

        <div id="lista-movimientos"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
