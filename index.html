<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Familiares</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="auth-container" class="app-container" style="display: none;">
        <header class="main-header">
            <h1>Finanzas Familia</h1>
            <p>Ingresa para continuar</p>
        </header>
        <div class="input-card">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button id="btn-login" class="btn-principal">Entrar / Registrar</button>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <header class="main-header">
            <div class="header-top">
                <input type="month" id="filtro-mes">
                <button id="btn-logout">Salir</button>
            </div>
            <h1 id="balance-total">$0.00</h1>
        </header>
        <div class="chart-card"><canvas id="miGrafico"></canvas></div>
        <div class="input-card">
            <div class="row">
                <input type="number" id="monto" placeholder="Monto">
                <select id="tipo"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option></select>
            </div>
            <input type="text" id="categoria" placeholder="Categoría">
            <button id="btn-guardar" class="btn-principal">Guardar</button>
        </div>
        <div id="lista-movimientos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
